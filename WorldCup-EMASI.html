<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EMASI Vạn Phúc World Cup 2026 - Live Draw</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>

    <!-- Babel compiler for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Firebase SDK (Compat Mode) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

    <!-- EMASI Brand Alignment -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,300..900;1,300..900&display=swap"
        rel="stylesheet">

    <style>
        @keyframes popIn {
            0% {
                opacity: 0;
                transform: scale(0.8) translateY(20px);
            }

            100% {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        @keyframes slideInRight {
            from {
                opacity: 0;
                transform: translateX(50px);
            }

            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        :root {
            /* Fluid sizing scaled down for laptop screens to avoid 67% zoom requirement */
            --fluid-text-h1: clamp(1.5rem, 3.5vw, 2.5rem);
            --fluid-text-h2: clamp(0.8rem, 2vw, 1.5rem);
            --fluid-text-h3: clamp(1.2rem, 2.5vw, 2rem);
            --fluid-box-h: clamp(1.5rem, 3vh, 2rem);
            --fluid-grid-gap: clamp(0.3rem, 0.8vw, 1rem);
        }

        .fluid-h1 {
            font-size: var(--fluid-text-h1);
        }

        .fluid-h2 {
            font-size: var(--fluid-text-h2);
        }

        .fluid-h3 {
            font-size: var(--fluid-text-h3);
        }

        /* Custom scrollbar matching glass theme */
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: rgba(34, 211, 238, 0.5);
        }

        /* Prevent content cut-off on short screens */
        @media (max-height: 700px) {
            .presentation-header {
                padding-top: 1rem;
                padding-bottom: 1rem;
            }

            .grid-container {
                gap: 0.5rem;
            }

            .group-box-row {
                height: 2rem;
            }
        }

        /* CINEMATIC GLASSMORPHISM CSS */
        .glass {
            background: rgba(10, 15, 25, 0.7);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 10px 40px 0 rgba(0, 0, 0, 0.7), inset 0 1px 0 0 rgba(255, 255, 255, 0.1);
        }

        .glass-light {
            background: rgba(25, 35, 50, 0.6);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            box-shadow: inset 0 1px 0 0 rgba(255, 255, 255, 0.1);
        }

        .glass-active {
            background: linear-gradient(135deg, rgba(212, 175, 55, 0.15) 0%, rgba(20, 30, 40, 0.8) 100%);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(212, 175, 55, 0.6);
            box-shadow: 0 0 25px rgba(212, 175, 55, 0.3), inset 0 1px 5px rgba(212, 175, 55, 0.2);
        }

        /* Gold text gradient */
        .text-gradient-gold {
            background: linear-gradient(to right, #ffd700, #f8b500, #ffaa00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* NEW ANIMATIONS FOR MENU */
        @keyframes float {
            0% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(-8px);
            }

            100% {
                transform: translateY(0px);
            }
        }

        .animate-float {
            animation: float 6s ease-in-out infinite;
        }

        .stagger-1 {
            animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            opacity: 0;
        }

        .stagger-2 {
            animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) 0.15s forwards;
            opacity: 0;
        }

        .stagger-3 {
            animation: popIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) 0.3s forwards;
            opacity: 0;
        }

        @keyframes shine {
            from {
                transform: translateX(-100%) skewX(-15deg);
            }

            to {
                transform: translateX(200%) skewX(-15deg);
            }
        }

        .shine-effect {
            position: relative;
            overflow: hidden;
        }

        .shine-effect::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 50%;
            height: 100%;
            background: linear-gradient(to right, transparent, rgba(255, 255, 255, 0.3), transparent);
            animation: shine 3s infinite;
        }

        @keyframes pulse-slow {

            0%,
            100% {
                opacity: 0.3;
                transform: scale(1);
            }

            50% {
                opacity: 0.6;
                transform: scale(1.1);
            }
        }

        .animate-pulse-slow {
            animation: pulse-slow 8s ease-in-out infinite;
        }

        .card-perspective {
            perspective: 1000px;
        }

        .card-inner {
            transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform-style: preserve-3d;
        }
    </style>
</head>

<body class="bg-[#021424] text-white" style="font-family: 'Montserrat', sans-serif;">

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, Component } = React;

        // Global error handler for Babel/Initial load issues
        window.onerror = function (msg, url, lineNo, columnNo, error) {
            console.error('CRITICAL ERROR:', msg, 'at', lineNo, ':', columnNo);
            const root = document.getElementById('root');
            if (root) {
                root.innerHTML = `<div style="padding: 40px; color: #ff5555; background: #0a0a0a; font-family: 'Segoe UI', sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center;">
                    <h1 style="font-size: 2.5rem; margin-bottom: 1rem; color: #D4AF37;">FATAL APPLICATION CRASH</h1>
                    <p style="font-size: 1.1rem; opacity: 0.8; max-width: 600px; line-height: 1.6; color: #fff;">The FIFA Draw System encountered a runtime error that prevented it from starting.</p>
                    <div style="background: rgba(255,0,0,0.1); border: 1px solid rgba(255,0,0,0.2); padding: 20px; border-radius: 12px; margin: 2rem 0; font-family: monospace; text-align: left; width: 100%; max-width: 800px; color: #ffaa00;">
                        <p style="margin-bottom: 5px; font-weight: bold;">Error: ${msg}</p>
                        <p style="color: #888; font-size: 0.8rem;">Location: ${url}:${lineNo}:${columnNo}</p>
                        <div style="margin-top: 15px; color: #fff; font-size: 0.7rem; opacity: 0.5;">Note: Line numbers refer to Babel transpiled script.</div>
                    </div>
                    <button onclick="window.location.reload()" style="background: #D4AF37; color: black; border: none; padding: 15px 40px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 1rem;">RELOAD SYSTEM</button>
                </div>`;
            }
            return false;
        };

        class ErrorBoundary extends Component {
            constructor(props) {
                super(props);
                this.state = { hasError: false, error: null };
            }
            static getDerivedStateFromError(error) {
                return { hasError: true, error };
            }
            componentDidCatch(error, errorInfo) {
                console.error("ErrorBoundary caught an error:", error, errorInfo);
            }
            render() {
                if (this.state.hasError) {
                    return (
                        <div className="min-h-screen bg-slate-950 text-white flex items-center justify-center p-10 font-sans">
                            <div className="max-w-xl w-full glass p-8 rounded-3xl border border-red-500/30 shadow-2xl">
                                <h1 className="text-2xl font-black text-red-500 mb-4 uppercase tracking-tighter">Application Error</h1>
                                <p className="text-white/60 mb-6 text-sm">The FIFA Draw interface encountered a problem. This is likely due to an incomplete data synchronization with the server.</p>
                                <div className="bg-black/50 p-4 rounded-xl border border-white/5 mb-6 overflow-auto max-h-40">
                                    <code className="text-xs text-red-400 break-words">{this.state.error && this.state.error.toString()}</code>
                                </div>
                                <button
                                    onClick={() => window.location.reload()}
                                    className="w-full py-3 glass-active text-amber-500 font-bold rounded-xl hover:bg-white/5 transition"
                                >
                                    Reload Application
                                </button>
                            </div>
                        </div>
                    );
                }
                return this.props.children;
            }
        }

        // --- SVGs ---
        const IconBase = ({ children, className = "w-6 h-6", strokeWidth = 2, ...props }) => (
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" className={className} {...props}>
                {children}
            </svg>
        );
        const Trophy = (props) => <IconBase {...props}><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6" /><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18" /><path d="M4 22h16" /><path d="M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22" /><path d="M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22" /><path d="M18 2H6v7a6 6 0 0 0 12 0V2Z" /></IconBase>;
        const Play = (props) => <IconBase {...props}><polygon points="5 3 19 12 5 21 5 3" /></IconBase>;
        const Check = (props) => <IconBase {...props}><polyline points="20 6 9 17 4 12" /></IconBase>;
        const ListOrdered = (props) => <IconBase {...props}><line x1="10" x2="21" y1="6" y2="6" /><line x1="10" x2="21" y1="12" y2="12" /><line x1="10" x2="21" y1="18" y2="18" /><path d="M4 6h1v4" /><path d="M4 10h2" /><path d="M6 18H4c0-1 2-2 2-3s-1-1.5-2-1" /></IconBase>;
        const MonitorPlay = (props) => <IconBase {...props}><rect width="20" height="14" x="2" y="3" rx="2" /><path d="M12 17v4" /><path d="M8 21h8" /><path d="m10 7 5 3-5 3Z" /></IconBase>;
        const Settings = (props) => <IconBase {...props}><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z" /><circle cx="12" cy="12" r="3" /></IconBase>;
        const Search = (props) => <IconBase {...props}><circle cx="11" cy="11" r="8" /><path d="m21 21-4.3-4.3" /></IconBase>;
        const X = (props) => <IconBase {...props}><path d="M18 6 6 18" /><path d="m6 6 12 12" /></IconBase>;
        const Radio = (props) => <IconBase {...props}><path d="M4.9 19.1C1 15.2 1 8.8 4.9 4.9" /><path d="M7.8 16.2c-2.3-2.3-2.3-6.1 0-8.5" /><circle cx="12" cy="12" r="2" /><path d="M16.2 7.8c2.3 2.3 2.3 6.1 0 8.5" /><path d="M19.1 4.9C23 8.8 23 15.1 19.1 19" /></IconBase>;
        const LayoutGrid = (props) => <IconBase {...props}><rect width="7" height="7" x="3" y="3" rx="1" /><rect width="7" height="7" x="14" y="3" rx="1" /><rect width="7" height="7" x="14" y="14" rx="1" /><rect width="7" height="7" x="3" y="14" rx="1" /></IconBase>;
        const Pencil = (props) => <IconBase {...props}><path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z" /><path d="m15 5 4 4" /></IconBase>;
        const Trash2 = (props) => <IconBase {...props}><path d="M3 6h18" /><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6" /><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2" /><line x1="10" x2="10" y1="11" y2="17" /><line x1="14" x2="14" y1="11" y2="17" /></IconBase>;
        const CheckCircle2 = (props) => <IconBase {...props}><circle cx="12" cy="12" r="10" /><path d="m9 12 2 2 4-4" /></IconBase>;
        const Maximize2 = (props) => <IconBase {...props}><polyline points="15 3 21 3 21 9" /><polyline points="9 21 3 21 3 15" /><line x1="21" y1="3" x2="14" y2="10" /><line x1="3" y1="21" x2="10" y2="14" /></IconBase>;
        const MousePointer2 = (props) => <IconBase {...props}><path d="m3 3 7.07 16.97 2.51-7.39 7.39-2.51L3 3z" /><path d="m13 13 6 6" /></IconBase>;

        // --- DATA ---
        const GROUPS_ALL = ['A', 'B', 'C', 'D', 'E', 'F', 'G', 'H', 'I', 'J', 'K', 'L'];

        const INITIAL_CLASSES = [
            "1E", "1M", "1A", "1S", "2E", "2M", "2A", "3E",
            "3M", "3A", "3S", "4E", "4M", "4A", "4S", "5E",
            "5M", "5A", "5S", "6E", "6M", "6A", "6S", "7M",
            "7A", "7S", "8M", "8A", "9E", "9M", "9A", "10E",
            "10M", "11E", "11M", "12E", "12M", "TA", "GUARDS", "OFFICE",
            "SA", "SKYLINE", "ADMISSION", "CLEANERS", "IT+TEAM ALPHA", "SUBJECT TEACHERS", "MAINTENANCE"
        ];

        const INITIAL_COUNTRIES = [
            // Column 1
            { name: "Korea Republic", code: "kr" }, { name: "Mexico", code: "mx" }, { name: "South Africa", code: "za" },
            { name: "Canada", code: "ca" }, { name: "Qatar", code: "qa" }, { name: "Switzerland", code: "ch" },
            { name: "Brazil", code: "br" }, { name: "Morocco", code: "ma" }, { name: "Haiti", code: "ht" },
            { name: "Scotland", code: "gb-sct" }, { name: "USA", code: "us" }, { name: "Paraguay", code: "py" },

            // Column 2
            { name: "Australia", code: "au" }, { name: "Germany", code: "de" }, { name: "Curacao", code: "cw" },
            { name: "Cote d'Ivoire", code: "ci" }, { name: "Ecuador", code: "ec" }, { name: "Netherlands", code: "nl" },
            { name: "Japan", code: "jp" }, { name: "Tunisia", code: "tn" }, { name: "Belgium", code: "be" },
            { name: "Egypt", code: "eg" }, { name: "New Zealand", code: "nz" }, { name: "Spain", code: "es" },

            // Column 3
            { name: "Cape Verde", code: "cv" }, { name: "Saudi Arabia", code: "sa" }, { name: "Uruguay", code: "uy" },
            { name: "France", code: "fr" }, { name: "Senegal", code: "sn" }, { name: "Norway", code: "no" },
            { name: "Argentina", code: "ar" }, { name: "Algeria", code: "dz" }, { name: "Austria", code: "at" },
            { name: "Jordan", code: "jo" }, { name: "Portugal", code: "pt" }, { name: "Uzbekistan", code: "uz" },

            // Column 4
            { name: "Colombia", code: "co" }, { name: "England", code: "gb-eng" }, { name: "Croatia", code: "hr" },
            { name: "Ghana", code: "gh" }, { name: "Panama", code: "pa" }, { name: "Czech Republic", code: "cz" },
            { name: "Turkey", code: "tr" }, { name: "Iraq", code: "iq" }, { name: "Sweden", code: "se" },
            { name: "Bosnia & Herzegovina", code: "ba" }, { name: "DR Congo", code: "cd" }
        ];

        const getFlagUrl = (code) => {
            if (!code || code === 'unknown') return 'data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIxMDAlIiBoZWlnaHQ9IjEwMCUiIHZpZXdCb3g9IjAgMCAxMDAgMTAwIj48cmVjdCB3aWR0aD0iMTAwIiBoZWlnaHQ9IjEwMCIgZmlsbD0iIzFmMjkyZSIvPjx0ZXh0IHg9IjUwIiB5PSI1NSIgZm9udC1mYW1pbHk9IkFyaWFsIiBmb250LXNpemU9IjQwIiBmaWxsPSIjM2Y0ZjZlIiB0ZXh0LWFuY2hvcj0ibWlkZGxlIj4/PC90ZXh0Pjwvc3ZnPg==';
            return `https://flagcdn.com/w160/${code}.png`;
        };

        // --- REUSABLE BACKGROUND COMPONENT ---
        const GlobalBackground = () => (
            <div className="fixed inset-0 z-0 pointer-events-none bg-[#050B14] overflow-hidden">
                {/* Stadium background overlay via CSS gradients to mimic a dark stadium pitch under spotlights */}
                <div className="absolute inset-0 bg-[radial-gradient(ellipse_at_top,#2b4f2c_0%,#050B14_60%)] opacity-80"></div>
                <div className="absolute inset-0 bg-[linear-gradient(rgba(255,255,255,0.02)_1px,transparent_1px),linear-gradient(90deg,rgba(255,255,255,0.02)_1px,transparent_1px)] bg-[size:40px_40px] opacity-20 transform perspective-1000 rotateX(60deg) scale(2) translate-y-[20%]"></div>
                <div className="absolute top-0 left-1/2 -translate-x-1/2 w-[80vw] h-[80vw] max-w-[1200px] max-h-[1200px] bg-[radial-gradient(circle_at_center,rgba(255,223,100,0.1)_0%,transparent_50%)] mix-blend-screen pointer-events-none"></div>
                <div className="absolute top-[-20%] left-1/2 -translate-x-1/2 w-[40vw] h-[60vh] bg-[conic-gradient(from_180deg_at_50%_0%,rgba(255,255,255,0)_0deg,rgba(255,255,255,0.05)_160deg,rgba(255,255,255,0.2)_180deg,rgba(255,255,255,0.05)_200deg,rgba(255,255,255,0)_360deg)] blur-2xl"></div>
                {/* Vignette */}
                <div className="absolute inset-0 bg-[radial-gradient(circle_at_center,transparent_30%,#020617_100%)] opacity-90"></div>
            </div>
        );

        // --- REUSABLE TREE VIEW COMPONENT ---
        const GroupTreeView = ({ state, autoScrollRef, onRemoveResult }) => {
            const [editingGroup, setEditingGroup] = useState(null);

            return (
                <div className="flex-1 overflow-y-auto p-4 custom-scrollbar">
                    <div className="flex flex-col gap-4">
                        {GROUPS_ALL.map(g => {
                            const results = (state && Array.isArray(state.results)) ? state.results : [];
                            const groupResults = results.filter(r => r && r.group === g);

                            let displayResults = [...groupResults];
                            const currentDraw = (state && state.currentDraw) ? state.currentDraw : {};
                            if (state && state.currentGroup === g && (currentDraw.stage || 0) > 0) {
                                displayResults.push({
                                    isPending: true,
                                    class: currentDraw.selectedClass,
                                    country: (currentDraw.stage || 0) === 2 ? currentDraw.selectedCountry : null
                                });
                            }

                            const max = g === 'L' ? 3 : 4;
                            const isFull = displayResults.length >= max;
                            const isCurrent = state && state.currentGroup === g;
                            const isEditing = editingGroup === g;

                            const currentRef = isCurrent ? autoScrollRef : null;

                            return (
                                <div key={g} ref={currentRef} className={`relative glass-light p-4 rounded-3xl transition-all duration-700 ${isCurrent ? 'glass-active scale-[1.02] shadow-[0_20px_40px_rgba(212,175,55,0.3)] border-amber-400' : isFull ? 'opacity-40 grayscale-[0.5]' : 'border-white/5'} ${isEditing ? 'border-amber-400 glass border-dashed opacity-100' : ''}`}>
                                    {isCurrent && <div className="absolute -top-2 -right-2 bg-amber-500 text-black text-[9px] font-black px-2 py-0.5 rounded-full shadow-lg z-10 animate-pulse">ACTIVE</div>}

                                    <div className="flex justify-between items-center mb-3">
                                        <h4 className={`text-xs font-black tracking-widest ${isCurrent ? 'text-amber-400' : 'text-white/60'}`}>GROUP {g}</h4>
                                        <div className="flex items-center gap-2">
                                            <span className={`text-[10px] font-bold ${isFull ? 'text-emerald-400' : 'text-white/30'}`}>{displayResults.length}/{max}</span>
                                            {onRemoveResult && (
                                                <button
                                                    onClick={() => setEditingGroup(isEditing ? null : g)}
                                                    className={`p-1.5 rounded-lg transition-all ${isEditing ? 'bg-amber-500 text-black' : 'text-white/30 hover:text-amber-400 hover:bg-white/5'}`}
                                                >
                                                    {isEditing ? <Check className="w-3 h-3" /> : <Pencil className="w-3 h-3" />}
                                                </button>
                                            )}
                                        </div>
                                    </div>

                                    <div className="flex flex-col gap-2">
                                        {displayResults.length === 0 && <div className="text-[10px] text-white/20 italic py-2 text-center border border-dashed border-white/5 rounded-xl">No slots drawn yet</div>}
                                        {displayResults.map((r, i) => (
                                            <div key={i} className={`flex items-center gap-3 glass p-2 rounded-xl border transition-all ${r.isPending ? 'border-amber-400 border-dashed bg-amber-500/10' : 'border-white/5'} ${isEditing && !r.isPending ? 'hover:border-red-500/50 hover:bg-red-500/5' : ''}`}>
                                                <div className="w-8 h-8 rounded-lg glass-light flex items-center justify-center shrink-0 border border-white/10">
                                                    <span className={`text-[10px] font-black ${r.isPending ? 'text-amber-400' : 'text-emerald-400'} whitespace-pre-line text-center leading-[1]`}>{r.class}</span>
                                                </div>

                                                <div className="flex-1 min-w-0">

            // Listen to Firebase for global state updates
            useEffect(() => {
                const drawRef = database.ref('drawState');

                // Initial fetch
                drawRef.once('value').then((snapshot) => {
                    const data = snapshot.val();
                    if (data && typeof data === 'object') {
                        setSharedState(prev => {
                            const merged = { ...INITIAL_STATE, ...data };
                            return {
                                ...merged,
                                results: Array.isArray(data.results) ? data.results : INITIAL_STATE.results,
                                remainingClasses: Array.isArray(data.remainingClasses) ? data.remainingClasses : INITIAL_STATE.remainingClasses,
                                remainingCountries: Array.isArray(data.remainingCountries) ? data.remainingCountries : INITIAL_STATE.remainingCountries,
                                currentDraw: (data.currentDraw && typeof data.currentDraw === 'object') ? { ...INITIAL_STATE.currentDraw, ...data.currentDraw } : INITIAL_STATE.currentDraw
                            };
                        });
                    }
                });

                // Realtime sub
                const onValueChange = drawRef.on('value', (snapshot) => {
                    const data = snapshot.val();
                    if (data && typeof data === 'object') {
                        setSharedState(prev => {
                            const merged = { ...INITIAL_STATE, ...data };
                            return {
                                ...merged,

                            };
                        });
                    }
                    setIsConnected(true);
                }, (error) => {

                    setIsConnected(false);

                return () => drawRef.off('value', onValueChange);

            if (!state) return <div className="p-10 text-white/50 italic">Initialising state...</div>;

            const countries = (state && Array.isArray(state.remainingCountries)) ? state.remainingCountries : [];
            const filteredCountries = React.useMemo(() => {
                const term = (searchCountry || "").trim().toLowerCase();
                // De-duplicate by code first
                const unique = Array.from(new Map(countries.filter(c => c && c.code).map(c => [c.code, c])).values());
                return unique
                    .filter(c => c.name.toLowerCase().includes(term))
                    .sort((a, b) => a.name.localeCompare(b.name));
            }, [countries, searchCountry]);

            const classes = (state && Array.isArray(state.remainingClasses)) ? state.remainingClasses : [];
            const filteredClasses = React.useMemo(() => {
                const term = (searchClass || "").trim().toLowerCase();
                return [...new Set(classes)]
                    .filter(c => {
                        if (!c) return false;
                        // Only show ALL CAPS classes/departments as requested
                        if (c !== c.toUpperCase()) return false;
                        return c.toLowerCase().includes(term);
                    })
                    .sort((a, b) => {
                        const idxA = INITIAL_CLASSES.indexOf(a);
                        const idxB = INITIAL_CLASSES.indexOf(b);
                        if (idxA !== -1 && idxB !== -1) return idxA - idxB;
                        if (idxA !== -1) return -1;
                        if (idxB !== -1) return 1;
                        return a.localeCompare(b);
                    });
            }, [classes, searchClass]);

            // --- ACTIONS ---


            const handleGroupSelect = (g) => {
                updateState({
                    ...state,
                    currentGroup: g,
                    lastActiveGroup: g ? g : state.lastActiveGroup,
                    currentDraw: { stage: 0, selectedClass: null, selectedCountry: null }
                });
                setSelectedClassInput("");
                setSelectedCountryInput(null);
            };

            const handleRevealClass = () => {
                if (!selectedClassInput) return alert("Please select a Class first!");
                updateState({
                    ...state,
                    currentDraw: { ...(state?.currentDraw || {}), stage: 1, selectedClass: selectedClassInput }
                });
            };

            const handleRevealCountry = () => {

                const results = (state && Array.isArray(state.results)) ? state.results : [];
                const newResults = [...results, { group: (state && state.currentGroup) ? state.currentGroup : "", class: selectedClass, country: selectedCountry }];

                const groupResultsCount = newResults.filter(r => r && r.group === (state && state.currentGroup ? state.currentGroup : "")).length;
                const maxForGroup = (state && state.currentGroup === 'L') ? 3 : 4;
                const nextGroup = groupResultsCount >= maxForGroup ? "" : (state && state.currentGroup ? state.currentGroup : "");

                updateState({
                    ...state,
                    currentGroup: nextGroup,
                    lastActiveGroup: (state && state.currentGroup) ? state.currentGroup : (state && state.lastActiveGroup ? state.lastActiveGroup : ""),
                    results: newResults,
                    remainingClasses: [...new Set(((state && Array.isArray(state.remainingClasses)) ? state.remainingClasses : []).filter(c => c && c !== selectedClass))],
                    remainingCountries: ((state && Array.isArray(state.remainingCountries)) ? state.remainingCountries : []).filter(c => c && selectedCountry && c.code !== selectedCountry.code),
                    currentDraw: { stage: 0, selectedClass: null, selectedCountry: null }
                });

                setSelectedClassInput("");
                setSelectedCountryInput(null);
                setSearchCountry("");
                setSearchClass("");

                const newRemainingClasses = [...new Set([...remainingClasses, resultToRemove.class])]

                const newRemainingCountries = Array.from(new Map([...remainingCountries, resultToRemove.country].map(c => [c.code, c])).values())
                    .sort((a, b) => {
                        const idxA = INITIAL_COUNTRIES.findIndex(c => c && c.code === a.code);
                        const idxB = INITIAL_COUNTRIES.findIndex(c => c && c.code === b.code);
                        if (idxA !== -1 && idxB !== -1) return idxA - idxB;
                        return a.name.localeCompare(b.name);

                                <div className="flex flex-col">
                                    <h1 className="text-lg lg:text-2xl font-black uppercase text-white tracking-tighter leading-none">
                                        <span className="text-gradient-gold">EMASI</span> WORLD CUP <span className="text-emerald-400 drop-shadow-[0_0_10px_rgba(52,211,153,0.5)]">2026™</span>
                                    </h1>
                                    <p className="text-[8px] text-white/40 font-bold uppercase tracking-[0.2em] mt-0.5">Official Draw Summary Board</p>
                                </div>
                            </div>

                            <div className="flex items-center gap-4">
                                <div className="flex items-center gap-6 glass-light rounded-2xl px-4 py-1.5 shadow-inner border border-white/5">
                                    <div className="flex flex-col items-center">
                                        <span className="text-[7px] font-black uppercase text-emerald-400">Confirmed</span>
                                        <span className="font-black text-base text-white">{(state?.results || []).length} / 47</span>
                                    </div>
                                    <div className="w-[1px] h-4 bg-white/10"></div>
                                    <div className="flex flex-col items-center">
                                        <span className="text-[7px] font-black uppercase text-amber-400">Status</span>
                                        <span className="font-black text-[10px] text-amber-500 uppercase">{(state?.results || []).length === 47 ? 'Ready' : 'In Draw'}</span>
                                    </div>
                                </div>
                                <img src="hình ảnh/logo WORLDCUP2026.png" className="h-10 lg:h-12 w-auto object-contain drop-shadow-[0_0_15px_rgba(255,255,255,0.4)]" alt="World Cup" />
                            </div>
                        </div>

                        {/* RIGHT GRID: Fit to Height */}
                        <div className="w-full h-full flex-1 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-2 2xl:gap-4 pt-24 lg:pt-20 pb-4 px-2 lg:px-4 overflow-hidden">
                            {groupsAll.map(g => (
                                <GroupBox key={g} groupId={g} state={state} isSummary={true} />
                            ))}
                        </div>
                    </div>
                </div>
            );
        }

        const GroupBox = ({ groupId, state, forceActive, hideHeader, isSummary }) => {
            const maxSlots = groupId === 'L' ? 3 : 4;
            const results = (state && Array.isArray(state.results)) ? state.results : [];
            const groupResults = results.filter(r => r && r.group === groupId);

            const isCurrent = state?.currentGroup === groupId;
            const isCompleted = groupResults.length >= maxSlots;
            const isActive = isCurrent || forceActive;

            return (
                <div className={`flex flex-col w-full transition-all duration-700 ${isActive ? 'scale-105 z-20' : ''} ${isSummary ? 'opacity-90 hover:opacity-100 hover:scale-[1.02]' : ''}`}>
                    {/* Header */}
                    {!hideHeader && (
                        <div className="flex items-center justify-between px-1.5 mb-0.5 relative">
                            <div className={`font-black uppercase transition-all duration-700 ${isActive ? 'text-2xl text-gradient-gold lg:text-3xl' : isSummary ? 'text-xs lg:text-sm text-amber-500' : 'text-sm lg:text-lg text-amber-400 drop-shadow-[0_0_8px_rgba(245,158,11,0.3)]'}`}>
                                GROUP {groupId}
                            </div>
                            {isActive && <div className="w-2.5 h-2.5 rounded-full bg-red-600 animate-pulse shadow-[0_0_10px_rgba(220,38,38,0.5)]"></div>}
                            {!isActive && isCompleted && <CheckCircle2 className="w-3 h-3 text-emerald-400 opacity-80" />}
                        </div>
                    )}

                    {/* Rows */}
                    <div className={`flex flex-col gap-1 w-full glass p-2 rounded-2xl border transition-all duration-700 ${isActive ? 'border-amber-400/50 bg-amber-400/5 shadow-2xl' : isCompleted ? 'border-emerald-500/40 bg-emerald-500/10' : 'border-white/10'} ${isSummary ? 'p-1.5 rounded-xl gap-0.5' : ''}`}>
                        {['1', '2', '3', '4'].slice(0, maxSlots).map((sub, idx) => {
                            const result = groupResults[idx];

                            return (
                                <div key={sub} className={`flex items-center rounded-lg overflow-hidden glass-light border border-white/5 ${isActive ? 'h-14 2xl:h-20' : isSummary ? 'h-8 lg:h-9 2xl:h-11' : 'h-12 2xl:h-16'}`}>
                                    {/* CLASS - FIXED WIDTH WITH MULTI-LINE SUPPORT */}
                                    <div className={`flex items-center justify-center shrink-0 border-r border-white/5 font-black px-1 uppercase transition-all duration-700 text-center ${isActive
                                        ? 'w-48 lg:w-56 2xl:w-80 ' + (
                                            (result?.class || sub).length > 10 ? 'text-lg lg:text-xl 2xl:text-2xl leading-none whitespace-pre-line' :
                                                (result?.class || sub).length > 6 ? 'text-xl lg:text-2xl 2xl:text-3xl leading-none whitespace-pre-line' :
                                                    'text-2xl lg:text-3xl 2xl:text-5xl whitespace-nowrap'
                                        ) + ' text-amber-400'
                                        : (isSummary ? 'w-18 lg:w-22 2xl:w-28 ' : 'w-24 lg:w-28 2xl:w-40 ') + (
                                            (result?.class || sub).length > 10 ? 'text-[8px] lg:text-[10px] 2xl:text-[12px] text-white leading-[0.9] whitespace-pre-line' :
                                                (result?.class || sub).length > 6 ? (isSummary ? 'text-[10px] lg:text-[11px] 2xl:text-[13px]' : 'text-[11px] lg:text-[13px] 2xl:text-[16px]') + ' text-white leading-tight whitespace-pre-line' :
                                                    (result?.class || sub).length > 4 ? (isSummary ? 'text-[11px] lg:text-xs 2xl:text-sm' : 'text-sm lg:text-xl 2xl:text-2xl') + ' text-white whitespace-nowrap' :
                                                        (isSummary ? 'text-xs lg:text-sm 2xl:text-base' : 'text-base lg:text-2xl 2xl:text-3xl') + ' text-white whitespace-nowrap'
                                        )}`}>
                                        {result?.class || '—'}
                                    </div>

                                    {/* TEAM NAME - ULTRA MINIMIZED PADDING */}
                                    <div className="flex-1 min-w-0 px-1 h-full flex items-center justify-start overflow-hidden">
                                        {result?.country ? (
                                            <span className={`text-white font-black uppercase tracking-tighter leading-none ${isActive
                                                ? (result.country.name.length > 20 ? 'text-lg lg:text-xl 2xl:text-2xl' :
                                                    result.country.name.length > 14 ? 'text-xl lg:text-2xl 2xl:text-3xl' :
                                                        'text-xl lg:text-2xl 2xl:text-4xl')
                                                : isSummary
                                                    ? (result.country.name.length > 20 ? 'text-[8px] lg:text-[9px] 2xl:text-[11px]' :
                                                        result.country.name.length > 16 ? 'text-[9px] lg:text-[11px] 2xl:text-[13px]' :
                                                            result.country.name.length > 12 ? 'text-[10px] lg:text-[12px] 2xl:text-[15px]' :
                                                                'text-[11px] lg:text-[14px] 2xl:text-[18px]')
                                                    : (result.country.name.length > 20 ? 'text-[10px] lg:text-[12px] 2xl:text-[14px]' :
                                                        result.country.name.length > 16 ? 'text-[11px] lg:text-[14px] 2xl:text-[17px]' :
                                                            result.country.name.length > 12 ? 'text-sm lg:text-xl 2xl:text-2xl' :
                                                                'text-base lg:text-2xl 2xl:text-3xl')
                                                } font-black text-white`}>
                                                {result.country.name}
                                            </span>
                                        ) : (
                                            <div className="w-8 h-0.5 bg-white/10 rounded-full"></div>
                                        )}
                                    </div>

                                    {/* FLAG - FIXED WIDTH FOR PERFECT ALIGNMENT */}
                                    <div className={`h-full flex items-center justify-center shrink-0 bg-black/10 ${isActive ? 'w-24 2xl:w-36' : 'w-18 lg:w-22 2xl:w-32'}`}>
                                        {result?.country ? (
                                            <img src={getFlagUrl(result.country.code)} className={`${isActive ? 'w-14 h-8 2xl:w-20 2xl:h-12' : 'w-14 h-9 2xl:w-20 2xl:h-12'} object-cover rounded shadow-sm`} alt="flag" />
                                        ) : (
                                            <div className="w-4 h-2.5 bg-white/5 rounded"></div>
                                        )}
                                    </div>
                                </div>
                            )
                        })}
                    </div>
                </div>
            )
        }

        // Render Application
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ErrorBoundary><App /></ErrorBoundary>);
    </script>
</body>

</html>
